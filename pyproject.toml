# ============================================================================
# Workspace Configuration for canVODpy Monorepo
# ============================================================================

[tool.uv.workspace]
members = ["packages/*", "canvodpy"]

# ============================================================================
# Development Dependencies (Workspace-wide)
# ============================================================================

[dependency-groups]
dev = [
    "commitizen>=4.13.3",
    "hypothesis>=6.151.4",
    "ipykernel>=7.1.0",
    "marimo>=0.19.5",
    "mkdocstrings-python>=2.0.1",
    "mystmd>=1.6.6",
    "pre-commit>=4.5.1",
    "pydeps>=3.0.2",
    "pytest>=9.0.1",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.14.5",
    "ty>=0.0.1a27",
    "zensical>=0.0.18",
]

# ============================================================================
# Ruff Configuration (Workspace-wide)
# ============================================================================
# Philosophy: catch real bugs, enforce consistent formatting, don't fight
# scientists over naming or style. This is a research codebase.

[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes (undefined names, unused imports, etc.)
    "W",     # pycodestyle warnings
    "I",     # isort (import sorting)
    "UP",    # pyupgrade (use modern Python syntax)
    "B",     # flake8-bugbear (catches likely bugs)
    "RUF",   # ruff-specific rules
]
# Dropped (stylistic, not bugs):
#   N   — naming (scientists use N, K, theta, phi, SNR, VOD ...)
#   SIM — simplify (opinionated if-else and ternary preferences)
#   C4  — comprehensions (dict() vs {} is not a bug)
#   PIE — misc lints (noise)
#   PT  — pytest style (4 violations, all opinionated)

ignore = [
    # --- Formatter handles these ---
    "E501",    # line-too-long: ruff format enforces 88 chars for code;
               # E501 fires on long strings/URLs the formatter can't break
    "W291",    # trailing-whitespace (formatter)
    "W293",    # blank-line-with-whitespace (formatter)
    "COM812",  # missing-trailing-comma (conflicts with ruff formatter)

    # --- Scientific code ---
    "F841",    # unused-variable (intermediate results, exploratory analysis)
    "RUF001",  # ambiguous-unicode-character-string (degree symbols, mu, etc.)
    "RUF002",  # ambiguous-unicode-character-docstring (GNSS notation)
    "RUF003",  # ambiguous-unicode-character-comment

    # --- Marimo notebooks ---
    "B018",    # useless-expression (marimo cells display via bare expressions)

    # --- Pragmatic ---
    "B905",    # zip-without-explicit-strict (not a real bug)
    "B007",    # unused-loop-control-variable (common in scientific iteration)
    "RUF059",  # unused-unpacked-variable (destructuring for clarity)
]

fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]           # re-exports and lazy imports
"**/{tests}/*" = ["S101", "PLR2004"]       # assert and magic values OK in tests
"**/demo/**" = ["F811", "F821", "F401", "E402"]  # marimo notebooks: cross-cell refs, re-exports

[tool.ruff.lint.isort]
known-first-party = ["canvod"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ============================================================================
# Pytest Configuration (Workspace-wide)
# ============================================================================

[tool.pytest.ini_options]
testpaths = [
    "canvodpy/tests",
    "packages/canvod-auxiliary/tests",
    "packages/canvod-grids/tests",
    "packages/canvod-readers/tests",
    "packages/canvod-store/tests",
    "packages/canvod-store-metadata/tests",
    "packages/canvod-virtualiconvname/tests",
    "packages/canvod-utils/tests",
    "packages/canvod-viz/tests",
    "packages/canvod-vod/tests",
    "packages/canvod-ops/tests",
    "packages/canvod-audit/tests",
]
addopts = "--cov --cov-report term-missing --cov-report lcov -rsx --verbose --color=yes"
markers = [
    "integration: marks tests as integration tests (may require config files or external resources)",
]

[tool.coverage.run]
relative_files = true

# ============================================================================
# Commitizen Configuration (Conventional Commits)
# ============================================================================

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
version_files = [
    "canvodpy/pyproject.toml:version",
    "packages/canvod-readers/pyproject.toml:version",
    "packages/canvod-auxiliary/pyproject.toml:version",
    "packages/canvod-grids/pyproject.toml:version",
    "packages/canvod-vod/pyproject.toml:version",
    "packages/canvod-store/pyproject.toml:version",
    "packages/canvod-store-metadata/pyproject.toml:version",
    "packages/canvod-viz/pyproject.toml:version",
    "packages/canvod-utils/pyproject.toml:version",
    "packages/canvod-virtualiconvname/pyproject.toml:version",
    "packages/canvod-ops/pyproject.toml:version",
    "packages/canvod-audit/pyproject.toml:version",
]
tag_format = "v$version"
update_changelog_on_bump = true
changelog_incremental = true
annotated_tag = true

[tool.commitizen.customize]
# Monorepo scopes for canvodpy
scopes = [
    "readers",
    "aux",
    "grids",
    "vod",
    "store",
    "viz",
    "utils",
    "naming",
    "orchestrator",
    "diagnostics",
    "ops",
    "audit",
    "ci",
    "docs",
    "deps",
]
