name: Audit integration tests

on:
    pull_request:
        paths:
            - "packages/canvod-audit/**"
            - "packages/canvod-store/**"
            - "packages/canvod-readers/**"
            - "packages/canvod-vod/**"
            - "packages/canvod-auxiliary/**"
            - "canvodpy/**"
    push:
        branches:
            - main
        paths:
            - "packages/canvod-audit/**"
            - "packages/canvod-readers/**"

jobs:
    audit-integration:
        name: Audit integration tests (real data)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Install uv and set the python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.14"
                  enable-cache: true

            - name: Set up Python
              run: uv python install

            - name: Install the project
              run: uv sync --locked --dev

            - name: Run audit tests (unit + integration with real data)
              run: >
                  uv run pytest
                  packages/canvod-audit/tests/
                  --verbose --color=yes --tb=long
