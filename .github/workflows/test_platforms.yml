name: Platform Tests

on:
    push:
    pull_request:
    schedule:
        - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    JUST_VERSION: "1.40.0"

jobs:
    build:
        name: Tests • ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      python-version: '3.14'
                      name: 'Python 3.14 - Ubuntu'
                    - os: windows-latest
                      python-version: '3.14'
                      name: 'Python 3.14 - Windows'
                    - os: macos-latest
                      python-version: '3.14'
                      name: 'Python 3.14 - macOS'

        defaults:
            run:
                shell: bash

        steps:
            - uses: actions/checkout@v6
            - name: Install uv and set the python version
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true
            - name: Set up Python
              run: uv python install
            - name: Install just
              run: |
                  if [[ "${{ runner.os }}" == "Linux" ]]; then
                    curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar -xz
                    sudo install -m 755 just /usr/local/bin/just
                    just --version
                  elif [[ "${{ runner.os }}" == "macOS" ]]; then
                    arch="$(uname -m)"
                    if [[ "$arch" == "arm64" ]]; then
                      target="aarch64-apple-darwin"
                    else
                      target="x86_64-apple-darwin"
                    fi
                    curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-${target}.tar.gz" | tar -xz
                    sudo install -m 755 just /usr/local/bin/just
                    just --version
                  elif [[ "${{ runner.os }}" == "Windows" ]]; then
                    curl -fsSL -o just.zip "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-pc-windows-msvc.zip"
                    powershell -NoProfile -Command "Expand-Archive -Path 'just.zip' -DestinationPath '.' -Force"
                    echo "$PWD" >> "$GITHUB_PATH"
                    ./just --version
                  else
                    echo "Unsupported OS for just install: ${{ runner.os }}"
                    exit 1
                  fi
            - name: Install the Project
              run: uv sync --locked --dev
            - name: Run Tests
              run: just test-all-packages
