[pytest]
# Pytest configuration for canvod-ops tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output
addopts =
    -v
    --strict-markers
    --tb=short

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests
    slow: Slow tests (large datasets, marked explicitly)
