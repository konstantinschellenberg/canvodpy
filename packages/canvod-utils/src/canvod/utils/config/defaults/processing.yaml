# ============================================================================
# Default Processing Configuration
# ============================================================================
# These are package defaults. Users should create config/processing.yaml
# with their own settings by running: just config-init

metadata:
  author: Unknown
  email: user@example.com
  institution: Unknown Institution

credentials:
  nasa_earthdata_acc_mail: null  # Optional: enables NASA CDDIS when set

aux_data:
  agency: COD
  product_type: final

processing:
  keep_rnx_vars:
    - SNR
    - Pseudorange
    - Phase
    - Doppler
  aggregate_glonass_fdma: true
  store_radial_distance: false
  receiver_position_mode: shared
  ephemeris_source: final  # 'final' (SP3/CLK) or 'broadcast' (SBF SatVisibility)
  batch_hours: 24
  resource_mode: auto
  # n_max_threads, max_memory_gb, cpu_affinity, nice_priority
  # are only used when resource_mode: manual

compression:
  zlib: true
  complevel: 5

icechunk:
  compression_level: 5
  compression_algorithm: zstd
  inline_threshold: 512
  get_concurrency: 1
  chunk_strategies:
    rinex_store:
      epoch: 34560
      sid: -1
    vod_store:
      epoch: 34560
      sid: -1
  manifest_preload_enabled: false
  manifest_preload_max_refs: 100000000
  manifest_preload_pattern: "epoch|sid"

storage:
  stores_root_dir: /path/to/stores  # MUST be set by user!
  rinex_store_strategy: skip
  rinex_store_expire_days: 2
  vod_store_strategy: overwrite

logging:
  log_dir: null  # Defaults to .logs/ in monorepo root
  log_file_name: canvodpy.log
  log_path_depth: 6

preprocessing:
  temporal_aggregation:
    enabled: true
    freq: "1min"
    method: "mean"
  grid_assignment:
    enabled: true
    grid_type: "equal_area"
    angular_resolution: 2.0
