[project]
name = "canvod-virtualiconvname"
version = "0.1.0"
description = "Filename convention, mapping engine, and catalog for canVODpy"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [
    "pydantic>=2.5.0",
    "duckdb>=1.0",
    "natsort>=8.4.0",
]

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "canvod.virtualiconvname"
