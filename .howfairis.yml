# howfairis configuration
# See: https://github.com/fair-software/howfairis

# Temporarily skip registry checks until first PyPI release
skip_registry_checks_reason: "Not published to PyPI yet; planned for v1.0.0. TestPyPI workflows are in place."

# Skip checklist checks until OpenSSF Best Practices badge is obtained
# Application process: https://bestpractices.coreinfrastructure.org/
skip_checklist_checks_reason: "OpenSSF Best Practices badge application in progress. Scorecard workflow now active."

# Ignore badges that are commented out in documentation
ignore_commented_badges: true

# Note: Repository, license, and citation checks should all pass
# - ✓ Public GitHub repository
# - ✓ Apache 2.0 license in LICENSE file
# - ✓ CITATION.cff with Zenodo DOI (10.5281/zenodo.18636775)
# - ✓ codemeta.json for machine-readable metadata
